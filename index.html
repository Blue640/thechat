<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheChat Radio</title>
    <style>
        body { background: #1a1d1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        .radio-unit {
            width: 320px; background: #353d35; border: 6px solid #222; border-radius: 10px;
            padding: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 15px; color: #92b721;
        }
        .screen {
            background: #1a2301; border: 4px solid #444; padding: 10px; height: 60px;
            display: flex; flex-direction: column; justify-content: center; border-radius: 5px;
        }
        .freq { font-size: 1.4em; font-weight: bold; color: #92b721; text-shadow: 0 0 5px #92b721; }
        #messageInput {
            background: #222; border: 2px solid #444; color: #92b721; padding: 12px;
            font-family: inherit; font-size: 16px; outline: none; border-radius: 5px; width: calc(100% - 28px);
        }
        .send-btn {
            background: #6d1a1a; color: white; border: 3px solid #222; padding: 15px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px;
            box-shadow: 0 4px 0 #4a1111; transition: 0.1s;
        }
        .send-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4a1111; background: #8e271c; }
    </style>
</head>
<body>

    <div class="radio-unit">
        <div class="screen">
            <div class="freq">FREQ: 100.5 MHz</div>
            <div style="font-size: 10px;" id="status">STANDBY</div>
        </div>
        <input type="text" id="messageInput" placeholder="ВВЕДИТЕ ТЕКСТ..." autocomplete="off">
        <button class="send-btn" id="sendBtn">ВЫЙТИ В ЭФИР</button>
    </div>

    <!-- Новое подключение Firebase через cdnjs (более надежно) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://firebasedatabase.app"
        };
        
        // Ждем полной загрузки скриптов
        window.onload = function() {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                const db = firebase.database();
                const chatRef = db.ref('channels/100_5/message');

                const input = document.getElementById('messageInput');
                const btn = document.getElementById('sendBtn');
                const status = document.getElementById('status');
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                function playSound(type) {
                    if (type === 'start') {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(880, audioCtx.currentTime);
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        o.start(); o.stop(audioCtx.currentTime + 0.1);
                    } else {
                        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                        const data = buf.getChannelData(0);
                        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                        const s = audioCtx.createBufferSource();
                        s.buffer = buf;
                        const gn = audioCtx.createGain();
                        gn.gain.setValueAtTime(0.02, audioCtx.currentTime);
                        s.connect(gn); gn.connect(audioCtx.destination);
                        s.start();
                    }
                }

                btn.onclick = () => {
                    const val = input.value.trim();
                    if (val) {
                        playSound('start');
                        chatRef.set(val);
                        input.value = '';
                        status.innerText = "SENDING...";
                    }
                };

                let first = true;
                chatRef.on('value', (snap) => {
                    if (first) { first = false; return; }
                    const msg = snap.val();
                    status.innerText = "RECEIVING...";
                    playSound('start');

                    setTimeout(() => {
                        const utter = new SpeechSynthesisUtterance(msg);
                        utter.lang = 'ru-RU';
                        utter.pitch = 0.8;
                        utter.onend = () => { playSound('noise'); status.innerText = "STANDBY"; };
                        window.speechSynthesis.speak(utter);
                    }, 300);
                });
            } else {
                document.getElementById('status').innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ";
                console.error("Firebase не загрузился!");
            }
        };
    </script>
</body>
</html>
