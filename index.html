<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>TheChat GMRS-R7 Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --body-bg: #121412;
            --radio-base: #3c443c;
            --lcd-glow: #a4b98c;
            --lcd-text: #1a2301;
            --btn-red: #8e271c;
        }

        body { 
            background: var(--body-bg); 
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGBkgAsgA7AGmBBMAAAVfwsL58H5wQAAAABJRU5ErkJggg==');
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Courier New', monospace;
        }

        .radio-unit {
            width: 360px; height: 600px;
            background: var(--radio-base);
            border: 5px solid #1a1c1a; border-radius: 20px;
            padding: 25px; box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.8);
            position: relative; display: flex; flex-direction: column; align-items: center;
        }

        .speaker-grille {
            width: 300px; height: 160px; background-color: #222;
            background-image: radial-gradient(#333 20%, transparent 20%), radial-gradient(#333 20%, transparent 20%);
            background-position: 0 0, 4px 4px; background-size: 8px 8px;
            border-radius: 12px; border: 4px solid #111; margin-bottom: 25px;
        }

        .screen-container {
            width: 280px; background: #111; border: 4px solid #0a0a0a;
            border-radius: 8px; padding: 5px; margin-bottom: 25px;
        }

        .screen {
            background: #879774; height: 70px; border-radius: 4px;
            padding: 10px; display: flex; flex-direction: column;
            justify-content: space-between; font-family: 'Orbitron', sans-serif;
            color: var(--lcd-text); position: relative;
        }

        .screen.active { background: var(--lcd-glow); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }

        .freq-display { font-size: 26px; font-weight: 700; }
        .status-display { font-size: 11px; text-transform: uppercase; }

        .knob {
            width: 55px; height: 55px; background: #222; border-radius: 50%;
            border: 4px solid #111; cursor: pointer; position: relative;
            transition: transform 0.2s; margin-bottom: 20px;
        }
        .knob::after { content: ""; position: absolute; top: 5px; left: 50%; width: 5px; height: 22px; background: #eee; transform: translateX(-50%); }

        #messageInput {
            width: 300px; background: #1a1c1a; border: 3px solid #111;
            color: #92b721; padding: 14px; font-family: inherit; font-size: 16px;
            border-radius: 8px; margin-bottom: 20px;
        }

        .send-btn {
            width: 220px; background: var(--btn-red); color: white;
            border: 5px solid #111; padding: 18px;
            font-weight: bold; cursor: pointer; border-radius: 12px;
            box-shadow: 0 8px 0 #4a1111;
        }
        .send-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #4a1111; }

    </style>
</head>
<body>

    <div class="radio-unit">
        <div class="speaker-grille"></div>
        <div class="screen-container">
            <div class="screen" id="lcdScreen">
                <div class="freq-display" id="freqDisplay">---.---</div>
                <div class="status-display" id="statusDisplay">OFFLINE</div>
                <div style="font-size: 14px; align-self: flex-end;">CH:<span id="channelNum">--</span></div>
            </div>
        </div>
        <div class="knob" id="channelKnob"></div>
        <input type="text" id="messageInput" placeholder="ПРИЕМ...">
        <button class="send-btn" id="sendBtn">ВЫЙТИ В ЭФИР</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://thechat-ea344-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const CHANNELS = [
            {id: 1, freq: "462.5625"}, {id: 2, freq: "462.5875"}, {id: 3, freq: "462.6125"},
            {id: 4, freq: "467.5625"}, {id: 5, freq: "467.5875"}, {id: 6, freq: "467.6125"}
        ];

        const ui = {
            screen: document.getElementById('lcdScreen'),
            freq: document.getElementById('freqDisplay'),
            status: document.getElementById('statusDisplay'),
            chanNum: document.getElementById('channelNum'),
            knob: document.getElementById('channelKnob'),
            input: document.getElementById('messageInput'),
            btn: document.getElementById('sendBtn')
        };

        let currentChannelIndex = 0;
        let db = null;
        let chatRef = null;
        let isReceiving = false;
        let audioCtx = null;
        let noiseGain = null;
        let radioFilter = null;
        let isFirstLoad = true; // ПЕРЕМЕННАЯ ДЛЯ ПРЕДОТВРАЩЕНИЯ ЛОЖНОГО СТАРТА

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            radioFilter = audioCtx.createBiquadFilter();
            radioFilter.type = "bandpass";
            radioFilter.frequency.value = 1200;
            radioFilter.Q.value = 0.8;
            radioFilter.connect(audioCtx.destination);

            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer; source.loop = true;
            source.connect(noiseGain); noiseGain.connect(radioFilter);
            source.start();
        }

        function playRadioSound(fileName) {
            if (!audioCtx) return;
            const audio = new Audio(`./${fileName}.wav`); 
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(radioFilter); 
            audio.play().catch(e => console.log("Sound play prevented or missing file"));
        }

        function playRadioSpeech(text) {
            if (isReceiving || !text) return;
            isReceiving = true;
            ui.status.innerText = "RECEIVING...";
            
            playRadioSound('radioon');
            
            setTimeout(() => { 
                if(noiseGain) noiseGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.1); 
            }, 100);

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                utter.voice = voices.find(v => v.lang === 'ru-RU') || voices[0];
                utter.lang = 'ru-RU';
                utter.pitch = 0.7;
                utter.rate = 1.0;

                utter.onend = () => {
                    playRadioSound('radiooff');
                    if(noiseGain) noiseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                    
                    setTimeout(() => {
                        ui.status.innerText = "STANDBY";
                        isReceiving = false;
                    }, 500);
                };
                window.speechSynthesis.speak(utter);
            }, 600);
        }

        function changeChannel(delta) {
            initAudio();
            if (chatRef) chatRef.off();
            
            isFirstLoad = true; // Сбрасываем при каждой смене канала
            
            currentChannelIndex = (currentChannelIndex + delta + CHANNELS.length) % CHANNELS.length;
            const chan = CHANNELS[currentChannelIndex];
            ui.chanNum.innerText = chan.id;
            ui.freq.innerText = chan.freq;
            ui.status.innerText = "CONNECTING...";
            ui.knob.style.transform = `rotate(${currentChannelIndex * 60}deg)`;

            chatRef = db.ref(`radio/ch_${chan.id}`);
            
            chatRef.on('value', snap => {
                const msg = snap.val();
                // Игнорируем первый запуск или пустое сообщение
                if (isFirstLoad) { 
                    isFirstLoad = false; 
                    ui.status.innerText = "STANDBY";
                    return; 
                }
                if (msg) playRadioSpeech(msg);
            });
        }

        ui.knob.onclick = () => changeChannel(1);
        
        ui.btn.onclick = () => {
            initAudio();
            const val = ui.input.value.trim();
            if (val && !isReceiving) {
                playRadioSound('radioon');
                chatRef.set(val);
                ui.input.value = '';
                ui.status.innerText = "TRANSMITTING...";
                setTimeout(() => { 
                    playRadioSound('radiooff');
                    ui.status.innerText = "STANDBY"; 
                }, 1500);
            }
        };

        window.onload = () => {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            changeChannel(0);
            ui.screen.classList.add('active');
        };
    </script>
</body>
</html>
