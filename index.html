<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tactical Radio GMRS-R7</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --body-bg: #121412;
            --radio-base: #3c443c;
            --lcd-glow: #a4b98c;
            --lcd-text: #1a2301;
            --btn-red: #8e271c;
        }

        body { 
            background: var(--body-bg); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Courier New', monospace;
        }

        /* Окно разблокировки звука */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        #startBtn {
            padding: 20px 40px; font-size: 24px; font-family: 'Orbitron';
            background: var(--btn-red); color: white; border: none; cursor: pointer; border-radius: 10px;
        }

        .radio-unit {
            width: 340px; height: 580px;
            background: var(--radio-base);
            border: 5px solid #1a1c1a; border-radius: 20px;
            padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative; display: flex; flex-direction: column; align-items: center;
        }

        .speaker-grille {
            width: 100%; height: 140px; background-color: #222;
            background-image: radial-gradient(#333 20%, transparent 20%), radial-gradient(#333 20%, transparent 20%);
            background-position: 0 0, 4px 4px; background-size: 8px 8px;
            border-radius: 12px; border: 4px solid #111; margin-bottom: 20px;
        }

        .screen-container {
            width: 260px; background: #111; border: 4px solid #0a0a0a;
            border-radius: 8px; padding: 5px; margin-bottom: 20px;
        }

        .screen {
            background: #879774; height: 80px; border-radius: 4px;
            padding: 10px; display: flex; flex-direction: column;
            justify-content: space-between; font-family: 'Orbitron', sans-serif;
            color: var(--lcd-text); transition: background 0.3s;
        }

        .screen.active { background: var(--lcd-glow); }

        .freq-display { font-size: 24px; font-weight: 700; }
        .status-display { font-size: 11px; text-transform: uppercase; font-weight: bold; }

        .knob {
            width: 50px; height: 50px; background: #222; border-radius: 50%;
            border: 4px solid #111; cursor: pointer; position: relative;
            transition: transform 0.2s; margin-bottom: 20px;
        }
        .knob::after { content: ""; position: absolute; top: 5px; left: 50%; width: 4px; height: 20px; background: #eee; transform: translateX(-50%); }

        #messageInput {
            width: 280px; background: #1a1c1a; border: 3px solid #111;
            color: #92b721; padding: 12px; font-size: 16px;
            border-radius: 8px; margin-bottom: 15px; outline: none;
        }

        .ptt-btn {
            width: 200px; background: var(--btn-red); color: white;
            border: 4px solid #111; padding: 15px;
            font-weight: bold; cursor: pointer; border-radius: 10px;
            text-transform: uppercase;
        }
        .ptt-btn:active { transform: translateY(3px); filter: brightness(1.2); }

    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">START SYSTEM</button>
    </div>

    <div class="radio-unit">
        <div class="speaker-grille"></div>
        <div class="screen-container">
            <div class="screen" id="lcdScreen">
                <div class="freq-display" id="freqDisplay">---.---</div>
                <div class="status-display" id="statusDisplay">OFFLINE</div>
                <div style="font-size: 12px; align-self: flex-end;">CH:<span id="channelNum">--</span></div>
            </div>
        </div>
        <div class="knob" id="channelKnob"></div>
        <input type="text" id="messageInput" placeholder="ВВОД...">
        <button class="ptt-btn" id="sendBtn">ВЫЙТИ В ЭФИР</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://thechat-ea344-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const CHANNELS = [
            {id: 1, freq: "462.5625"}, {id: 2, freq: "462.5875"}, {id: 3, freq: "462.6125"}
        ];

        let currentChannelIndex = 0;
        let db, chatRef, audioCtx, noiseGain, radioFilter;
        let isReceiving = false;
        let isFirstLoad = true;
        let myLastMessage = ""; // Чтобы не слушать самого себя

        const ui = {
            screen: document.getElementById('lcdScreen'),
            freq: document.getElementById('freqDisplay'),
            status: document.getElementById('statusDisplay'),
            chanNum: document.getElementById('channelNum'),
            knob: document.getElementById('channelKnob'),
            input: document.getElementById('messageInput'),
            btn: document.getElementById('sendBtn'),
            overlay: document.getElementById('overlay')
        };

        // Инициализация при нажатии СТАРТ
        document.getElementById('startBtn').onclick = () => {
            ui.overlay.style.display = 'none';
            initAudio();
            initFirebase();
        };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            radioFilter = audioCtx.createBiquadFilter();
            radioFilter.type = "bandpass";
            radioFilter.frequency.value = 1200;
            radioFilter.Q.value = 1.0;
            radioFilter.connect(audioCtx.destination);

            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;
            
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer; source.loop = true;
            source.connect(noiseGain); noiseGain.connect(radioFilter);
            source.start();
        }

        function playRadioSound(fileName) {
            if (!audioCtx) return;
            const audio = new Audio(`./${fileName}.wav`); 
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(radioFilter); 
            audio.play().catch(() => {});
        }

        function playRadioSpeech(text) {
            if (isReceiving || !text || text === myLastMessage) return;
            
            isReceiving = true;
            ui.status.innerText = "RECEIVING...";
            playRadioSound('radioon');
            
            setTimeout(() => { 
                noiseGain.gain.setTargetAtTime(0.02, audioCtx.currentTime, 0.05); 
            }, 200);

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                utter.voice = voices.find(v => v.lang === 'ru-RU') || voices[0];
                utter.lang = 'ru-RU';
                utter.pitch = 0.8;

                utter.onend = () => {
                    playRadioSound('radiooff');
                    noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                    setTimeout(() => {
                        ui.status.innerText = "STANDBY";
                        isReceiving = false;
                    }, 500);
                };
                window.speechSynthesis.speak(utter);
            }, 600);
        }

        function initFirebase() {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            changeChannel(0);
            ui.screen.classList.add('active');
        }

        function changeChannel(delta) {
            if (chatRef) chatRef.off();
            isFirstLoad = true;
            currentChannelIndex = (currentChannelIndex + delta + CHANNELS.length) % CHANNELS.length;
            const chan = CHANNELS[currentChannelIndex];
            
            ui.chanNum.innerText = chan.id;
            ui.freq.innerText = chan.freq;
            ui.status.innerText = "SCANNING...";
            ui.knob.style.transform = `rotate(${currentChannelIndex * 60}deg)`;

            chatRef = db.ref(`radio/ch_${chan.id}`);
            chatRef.on('value', snap => {
                const msg = snap.val();
                if (isFirstLoad) { isFirstLoad = false; ui.status.innerText = "STANDBY"; return; }
                playRadioSpeech(msg);
            });
        }

        ui.knob.onclick = () => changeChannel(1);

        ui.btn.onclick = () => {
            const val = ui.input.value.trim();
            if (val && !isReceiving) {
                myLastMessage = val; // Запоминаем, что это отправили МЫ
                chatRef.set(val);
                ui.input.value = '';
                ui.status.innerText = "TX...";
                
                // На своем устройстве просто вешаем STANDBY через секунду без звуков
                setTimeout(() => { ui.status.innerText = "STANDBY"; }, 1500);
            }
        };

        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
