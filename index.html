<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMRS-R64 PRO</title>
    <style>
        :root {
            --case-color: #222;
            --lcd-bg: #8ba870;
            --lcd-text: #1a2012;
            --btn-ptt: #9e2323;
            --plastic: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Оверлей запуска */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #fff; padding: 20px;
        }
        #startBtn {
            margin-top: 20px; padding: 15px 40px; font-size: 18px; font-weight: bold;
            background: #333; color: #0f0; border: 2px solid #0f0; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Админ Панель */
        #adminLogin, #adminPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,20,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #00aaff; font-family: 'Courier New', monospace;
        }
        .admin-box {
            border: 2px solid #00aaff; background: #000; padding: 30px; border-radius: 10px;
            box-shadow: 0 0 20px #00aaff; width: 90%; max-width: 350px;
        }
        .admin-input {
            background: #111; color: #0f0; border: 1px solid #00aaff; padding: 15px; margin-bottom: 20px; 
            text-align: center; font-size: 18px; width: 100%; outline: none; font-weight: bold;
        }
        .admin-btn {
            background: #002244; color: #00aaff; border: 1px solid #00aaff; padding: 15px; 
            cursor: pointer; font-size: 16px; margin-bottom: 10px; width: 100%; transition: 0.2s; font-weight: bold;
        }
        .admin-btn:hover { background: #00aaff; color: #000; }
        .admin-btn.red { border-color: #f00; color: #f00; background: #310000; }
        .admin-btn.red:hover { background: #f00; color: #000; box-shadow: 0 0 15px #f00;}

        /* Основной корпус рации */
        .radio-unit {
            width: 90vw; max-width: 380px; background: var(--case-color); background-image: var(--plastic);
            border: 4px solid #111; border-radius: 20px 20px 40px 40px;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.1);
            position: relative;
        }

        /* Антенна */
        .antenna {
            position: absolute; top: -60px; left: 30px; width: 22px; height: 70px;
            background: #151515; border-radius: 6px 6px 0 0;
            box-shadow: inset -5px 0 10px rgba(255,255,255,0.1);
        }

        /* Светодиоды */
        .led-panel { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; padding-left: 10px; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #000; border: 1px solid #333; }
        .led.active-rx { background: #0f0; box-shadow: 0 0 10px #0f0; }
        .led.active-tx { background: #f00; box-shadow: 0 0 10px #f00; }

        /* Динамик */
        .speaker {
            width: 100%; height: 50px; background: #1a1a1a;
            background-image: radial-gradient(#000 30%, transparent 30%);
            background-size: 6px 6px; border-radius: 10px; border: 2px solid #111; margin-bottom: 15px;
        }

        /* LCD Экран */
        .lcd-frame {
            width: 100%; background: #000; padding: 10px; border-radius: 8px;
            border: 3px solid #151515; margin-bottom: 20px; box-shadow: inset 0 0 10px #000;
        }
        .lcd-display {
            background: var(--lcd-bg); height: 95px; border-radius: 3px;
            padding: 8px 12px; display: flex; flex-direction: column; justify-content: space-between;
            color: var(--lcd-text); font-family: 'Courier New', monospace; font-weight: bold;
            position: relative; overflow: hidden; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .lcd-display::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
        .freq-row { font-size: 32px; letter-spacing: 2px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.2); margin: 5px 0;}
        .info-row { display: flex; justify-content: space-between; font-size: 14px; }
        .blinking { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Клавиатура */
        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            width: 100%; margin-bottom: 20px;
        }
        .key {
            background: #1a1a1a; color: #ddd; border: 2px solid #111;
            padding: 12px 0; font-size: 16px; font-weight: bold; font-family: 'Orbitron', sans-serif;
            border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0 #0a0a0a;
            transition: all 0.1s;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 0 0 #0a0a0a; }
        .key-cmd { color: #00aaff; font-size: 14px; }
        .key-ent { background: #2d5a27; color: #fff; }
        .key-clr { background: #6b2121; color: #fff; }

        /* Ввод и PTT */
        #msgInput {
            width: 100%; background: #111; border: 2px solid #333; color: #0f0;
            padding: 15px; font-size: 16px; border-radius: 8px; outline: none; margin-bottom: 15px;
            text-align: center; font-family: monospace;
        }
        .ptt-btn {
            width: 100%; background: linear-gradient(180deg, #333 0%, #222 100%);
            color: #aaa; border: 2px solid #111; border-bottom: 8px solid #0a0a0a;
            padding: 20px; font-size: 20px; font-weight: bold; border-radius: 12px;
            cursor: pointer; letter-spacing: 2px; transition: all 0.05s ease;
        }
        .ptt-btn:active {
            transform: translateY(6px); border-bottom-width: 2px;
            background: linear-gradient(180deg, #222 0%, #111 100%);
        }

        .footer-tag { margin-top: 10px; font-size: 10px; color: #555; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>GMRS-R64 PRO</h2>
        <p>СИСТЕМА ИНИЦИАЛИЗИРОВАНА</p>
        <button id="startBtn">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="adminLogin">
        <div class="admin-box">
            <h3 style="margin-top:0;">SYS ADMIN LOGIN</h3>
            <input type="password" id="adminPass" class="admin-input" placeholder="PASSWORD" autocomplete="off">
            <button class="admin-btn" onclick="checkAdmin()">ENTER</button>
            <button class="admin-btn" onclick="closeAdmin()">CANCEL</button>
        </div>
    </div>

    <div id="adminPanel">
        <div class="admin-box">
            <h3 style="margin-top:0; color: #fff;">BLUETRADE CONTROL</h3>
            <p id="adminChInfo" style="font-size: 24px; font-weight: bold; color: #0f0; margin-bottom: 20px;">CH: -- CODE: --</p>
            <button class="admin-btn red" id="jamBtn" onclick="toggleJam()">ЗАГЛУШИТЬ КАНАЛ</button>
            <button class="admin-btn" onclick="closeAdmin()">ВЫХОД</button>
        </div>
    </div>

    <div class="radio-unit">
        <div class="antenna"></div>
        <div class="led-panel">
            <div id="rxLed" class="led"></div>
            <div id="txLed" class="led"></div>
        </div>
        <div class="speaker"></div>
        
        <div class="lcd-frame">
            <div class="lcd-display">
                <div class="info-row">
                    <span id="statText">STANDBY</span>
                    <span>100X100</span>
                </div>
                <div class="freq-row" id="freqDisp">462.0000</div>
                <div class="info-row">
                    <span>CH: <span id="chVal">01</span></span>
                    <span>CODE: <span id="coVal">00</span></span>
                </div>
            </div>
        </div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            
            <button class="key key-cmd" onclick="pressKey('CH')">CH</button>
            <button class="key" onclick="pressKey('0')">0</button>
            <button class="key key-cmd" onclick="pressKey('CD')">CD</button>
            
            <button class="key key-clr" onclick="pressKey('CLR')">CLR</button>
            <button class="key" style="visibility: hidden;"></button>
            <button class="key key-ent" onclick="pressKey('ENT')">ENT</button>
        </div>

        <input type="text" id="msgInput" placeholder="> СООБЩЕНИЕ..." maxlength="100" autocomplete="off">
        <button class="ptt-btn" id="pttBtn">ПЕРЕДАЧА</button>
        
        <div class="footer-tag">BLUETRADE SYSTEMS</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://thechat-ea344-default-rtdb.europe-west1.firebasedatabase.app/" };
        
        let db, chatRef, audioCtx, noiseGain, radioFilter;
        let curCH = 1, curCODE = 0; 
        let isReceiving = false, isFirst = true, myLast = "";
        
        // Админка и Глушилка
        let inputMode = ''; 
        let inputBuffer = '';
        let secretBuffer = ''; 
        let isAdmin = false;
        let isChannelJammed = false;
        let joinedBeforeBlock = false; // Флаг: был ли юзер на канале до включения глушилки

        const ui = {
            freq: document.getElementById('freqDisp'),
            stat: document.getElementById('statText'),
            chVal: document.getElementById('chVal'),
            coVal: document.getElementById('coVal'),
            input: document.getElementById('msgInput'),
            rxLed: document.getElementById('rxLed'),
            txLed: document.getElementById('txLed')
        };

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            initAudio();
            initFirebase();
        };

        // --- ЛОГИКА АДМИНКИ ---
        window.checkAdmin = function() {
            if(document.getElementById('adminPass').value === 'bluelll') {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('adminChInfo').innerText = `CH: ${curCH} | CODE: ${curCODE}`;
                document.getElementById('adminPass').value = '';
                isAdmin = true;
            } else {
                alert('ACCESS DENIED');
                closeAdmin();
            }
        };

        window.closeAdmin = function() {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPass').value = '';
        };

        window.toggleJam = function() {
            if(!chatRef) return;
            isChannelJammed = !isChannelJammed;
            // Используем update, чтобы не стереть текущие сообщения на канале
            chatRef.update({ blocked: isChannelJammed });
        };

        // --- ЛОГИКА КЛАВИАТУРЫ ---
        window.pressKey = function(key) {
            if (isReceiving) return;

            // Изменен звук на button.mp3
            playTone('button'); 

            if (key === 'CH') {
                inputMode = 'CH'; inputBuffer = ''; secretBuffer = '';
                ui.stat.innerText = "SET CH"; ui.stat.classList.add('blinking');
                ui.chVal.innerText = "--";
            } 
            else if (key === 'CD') {
                inputMode = 'CD'; inputBuffer = ''; secretBuffer = '';
                ui.stat.innerText = "SET CODE"; ui.stat.classList.add('blinking');
                ui.coVal.innerText = "--";
            } 
            else if (key === 'CLR') {
                resetInput();
            } 
            else if (key === 'ENT') {
                if (inputMode === 'CH' && inputBuffer !== '') {
                    let v = parseInt(inputBuffer);
                    if (v >= 1 && v <= 100) curCH = v;
                }
                if (inputMode === 'CD' && inputBuffer !== '') {
                    let v = parseInt(inputBuffer);
                    if (v >= 0 && v <= 99) curCODE = v;
                }
                resetInput();
                sync();
            } 
            else { 
                // Ввод цифр
                if (inputMode !== '') {
                    if ((inputMode === 'CH' && inputBuffer.length < 3) || 
                        (inputMode === 'CD' && inputBuffer.length < 2)) {
                        inputBuffer += key;
                        if (inputMode === 'CH') ui.chVal.innerText = inputBuffer;
                        if (inputMode === 'CD') ui.coVal.innerText = inputBuffer;
                    }
                } else {
                    // Режим ожидания: отслеживаем секретный код 640064
                    secretBuffer += key;
                    if (secretBuffer.length > 10) secretBuffer = secretBuffer.slice(-10); // Храним только последние 10 нажатий
                    
                    if (secretBuffer.includes('640064')) {
                        document.getElementById('adminLogin').style.display = 'flex';
                        secretBuffer = ''; // Сбрасываем буфер
                    }
                }
            }
        };

        function resetInput() {
            inputMode = ''; inputBuffer = ''; secretBuffer = '';
            ui.stat.classList.remove('blinking');
            ui.stat.innerText = "STANDBY";
            updateDisplay();
        }

        function updateDisplay() {
            ui.chVal.innerText = curCH.toString().padStart(2, '0');
            ui.coVal.innerText = curCODE.toString().padStart(2, '0');
            let freq = 462.0000 + (curCH * 0.0125);
            ui.freq.innerText = freq.toFixed(4);
        }

        // --- АУДИО ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            radioFilter = audioCtx.createBiquadFilter();
            radioFilter.type = "bandpass";
            radioFilter.frequency.value = 1300; 
            radioFilter.Q.value = 1.5;
            radioFilter.connect(audioCtx.destination);

            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer; source.loop = true;
            source.connect(noiseGain); noiseGain.connect(radioFilter);
            source.start();
        }

        function playTone(file) {
            if (!audioCtx) return;
            const audio = new Audio(`./${file}.mp3`); // Ищем .mp3 (можно поменять на .wav если у тебя wav)
            const src = audioCtx.createMediaElementSource(audio);
            src.connect(radioFilter);
            audio.play().catch(e => {}); 
        }

        function playSpeech(text) {
            if (isReceiving || !text) return;
            isReceiving = true;
            ui.stat.innerText = "INCOMING"; ui.stat.classList.add('blinking');
            ui.rxLed.classList.add('active-rx');
            playTone('radioon'); // Для передачи оставляем radioon

            setTimeout(() => { noiseGain.gain.setTargetAtTime(0.015, audioCtx.currentTime, 0.05); }, 200);

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ru-RU'; utter.pitch = 0.8; utter.rate = 1.1;
                utter.onend = () => {
                    playTone('radiooff'); // Конец передачи
                    noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                    ui.rxLed.classList.remove('active-rx');
                    setTimeout(() => { 
                        ui.stat.classList.remove('blinking'); 
                        ui.stat.innerText = (isChannelJammed && !joinedBeforeBlock && !isAdmin) ? "JAMMED" : "STANDBY";
                        isReceiving = false; 
                    }, 400);
                };
                window.speechSynthesis.speak(utter);
            }, 600);
        }

        // --- FIREBASE СИНХРОНИЗАЦИЯ И ЛОГИКА ГЛУШИЛКИ ---
        function initFirebase() {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            sync();
        }

        function sync() {
            if (chatRef) chatRef.off();
            isFirst = true;
            joinedBeforeBlock = false;
            updateDisplay();
            ui.stat.innerText = "SYNC...";

            chatRef = db.ref(`tact100/ch_${curCH}/co_${curCODE}`);
            
            chatRef.on('value', snap => {
                const data = snap.val();
                
                if (!data) {
                    if(isFirst) { 
                        ui.stat.innerText = "STANDBY"; 
                        isFirst = false; 
                        joinedBeforeBlock = true; // Канал чист, юзер успешно зашел до глушилки
                    }
                    return;
                }

                // Проверяем статус глушилки
                isChannelJammed = data.blocked || false;

                // Обновляем кнопку в админке, если она открыта
                if (document.getElementById('adminPanel').style.display === 'flex') {
                    document.getElementById('jamBtn').innerText = isChannelJammed ? "РАЗБЛОКИРОВАТЬ КАНАЛ" : "ЗАГЛУШИТЬ КАНАЛ";
                }

                if (isFirst) { 
                    isFirst = false; 
                    if (isChannelJammed) {
                        joinedBeforeBlock = false; // Юзер подключился к УЖЕ заглушенному каналу
                        playTone('bloc');
                        ui.stat.innerText = "JAMMED";
                    } else {
                        joinedBeforeBlock = true;  // Юзер подключился до глушения
                        ui.stat.innerText = "STANDBY"; 
                    }
                    return; 
                }

                // Обновление статуса UI если кто-то заглушил канал, пока мы тут сидим
                if (isChannelJammed && !joinedBeforeBlock && !isAdmin) {
                    ui.stat.innerText = "JAMMED";
                } else if (!isChannelJammed) {
                    ui.stat.innerText = "STANDBY";
                    joinedBeforeBlock = true; // Если разблокировали, теперь все считаются "своими"
                }

                const msgId = (data.text || "") + "_" + (data.time || 0);
                if (msgId !== myLast && !isReceiving && data.text) {
                    // Если канал заглушен, и юзер не был тут до блока, и он не админ -> слышит bloc.mp3
                    if (isChannelJammed && !joinedBeforeBlock && !isAdmin) {
                        playTone('bloc');
                    } else {
                        // Те, кто был тут до включения глушилки, нормально слышат сообщение
                        playSpeech(data.text);
                    }
                }
            });
        }

        // --- КНОПКА PTT (ОТПРАВКА) ---
        document.getElementById('pttBtn').onclick = () => {
            // Если юзер "чужой" на заглушенном канале, не даем отправлять текст, просто играем звук блока
            if (isChannelJammed && !joinedBeforeBlock && !isAdmin) {
                playTone('bloc');
                ui.stat.innerText = "JAMMED";
                ui.stat.classList.add('blinking');
                setTimeout(() => { ui.stat.classList.remove('blinking'); }, 1000);
                return;
            }

            const val = ui.input.value.trim();
            if (val && !isReceiving && inputMode === '') {
                playTone('radioon'); // Передача как и раньше с radioon
                
                const timestamp = Date.now();
                myLast = val + "_" + timestamp;
                
                ui.txLed.classList.add('active-tx');
                ui.stat.innerText = "TRANSMIT"; ui.stat.classList.add('blinking');

                chatRef.update({
                    text: val,
                    time: timestamp
                });

                ui.input.value = '';

                setTimeout(() => { 
                    ui.txLed.classList.remove('active-tx');
                    ui.stat.classList.remove('blinking');
                    ui.stat.innerText = "STANDBY"; 
                }, 1200);
            }
        };

        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
