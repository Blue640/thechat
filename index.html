<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheChat Radio</title>
    <style>
        body { background: #1a1d1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        .radio-unit {
            width: 320px; background: #353d35; border: 6px solid #222; border-radius: 10px;
            padding: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 15px; color: #92b721;
        }
        .screen {
            background: #1a2301; border: 4px solid #444; padding: 10px; height: 60px;
            display: flex; flex-direction: column; justify-content: center; border-radius: 5px;
        }
        .freq { font-size: 1.4em; font-weight: bold; color: #92b721; text-shadow: 0 0 5px #92b721; }
        #messageInput {
            background: #222; border: 2px solid #444; color: #92b721; padding: 12px;
            font-family: inherit; font-size: 16px; outline: none; border-radius: 5px; width: calc(100% - 28px);
        }
        .send-btn {
            background: #6d1a1a; color: white; border: 3px solid #222; padding: 15px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px;
            box-shadow: 0 4px 0 #4a1111; transition: 0.1s;
        }
        .send-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #4a1111; background: #8e271c; }
    </style>
</head>
<body>

    <div class="radio-unit">
        <div class="screen">
            <div class="freq">FREQ: 100.5 MHz</div>
            <div style="font-size: 10px;" id="status">INITIALIZING...</div>
        </div>
        <input type="text" id="messageInput" placeholder="ВВЕДИТЕ ТЕКСТ..." autocomplete="off">
        <button class="send-btn" id="sendBtn">ВЫЙТИ В ЭФИР</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ТВОИ ДАННЫЕ ИЗ КОНСОЛИ FIREBASE
        const firebaseConfig = {
            databaseURL: "https://thechat-ea344-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        
        // Проверка инициализации
        if (firebaseConfig.databaseURL.includes("ВАШ-ПРОЕКТ")) {
            document.getElementById('status').innerText = "CONFIG ERROR";
        } else {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const chatRef = db.ref('channels/100_5/message');

            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            
            // AudioContext создаем после первого клика (требование браузеров)
            let audioCtx;

            function playSound(type) {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'start') {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(880, audioCtx.currentTime);
                    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    o.start(); o.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'noise') {
                    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                    const s = audioCtx.createBufferSource();
                    s.buffer = buf;
                    const gn = audioCtx.createGain();
                    gn.gain.setValueAtTime(0.01, audioCtx.currentTime);
                    s.connect(gn); gn.connect(audioCtx.destination);
                    s.start();
                }
            }

            btn.onclick = () => {
                const val = input.value.trim();
                if (val) {
                    playSound('start');
                    chatRef.set(val);
                    input.value = '';
                    status.innerText = "SENDING...";
                    setTimeout(() => status.innerText = "STANDBY", 1000);
                }
            };

            let first = true;
            chatRef.on('value', (snap) => {
                const msg = snap.val();
                if (first || !msg) { first = false; status.innerText = "STANDBY"; return; }
                
                status.innerText = "RECEIVING...";
                playSound('start');

                setTimeout(() => {
                    const utter = new SpeechSynthesisUtterance(msg);
                    utter.lang = 'ru-RU';
                    utter.pitch = 0.7; // Более грубый "рацийный" голос
                    utter.rate = 0.9;
                    utter.onend = () => { 
                        playSound('noise'); 
                        status.innerText = "STANDBY"; 
                    };
                    window.speechSynthesis.speak(utter);
                }, 400);
            });
        }
    </script>
</body>
</html>
